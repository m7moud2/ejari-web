<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجز العقار | إيجاري</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4A90E2;
            --primary-dark: #357ABD;
            --secondary-color: #2C3E50;
            --success-color: #27AE60;
            --warning-color: #F39C12;
            --danger-color: #E74C3C;
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-400: #9CA3AF;
            --gray-500: #6B7280;
            --gray-600: #4B5563;
            --gray-700: #374151;
        }

        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
            background-color: rgba(0, 0, 0, 0.5);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .booking-modal {
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 1rem;
        }

        .booking-card {
            background: white;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .booking-card-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            position: sticky;
            top: 0;
            z-index: 1;
        }

        .booking-card-header h3 {
            margin: 0;
            color: var(--secondary-color);
            font-size: 1.25rem;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--gray-500);
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .close-btn:hover {
            background-color: var(--gray-100);
        }

        .booking-card-content {
            padding: 1.5rem;
        }

        .property-summary {
            display: flex;
            gap: 1rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--gray-200);
            margin-bottom: 1.5rem;
        }

        .property-image {
            width: 100px;
            height: 100px;
            border-radius: 8px;
            object-fit: cover;
        }

        .property-info h4 {
            margin: 0 0 0.5rem 0;
            color: var(--secondary-color);
        }

        .location {
            color: var(--gray-600);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }

        .base-price {
            color: var(--primary-color);
            font-weight: 600;
            font-size: 1.125rem;
        }

        .duration-selector h4,
        .cost-breakdown h4,
        .start-date h4 {
            color: var(--secondary-color);
            margin: 0 0 1rem 0;
            font-size: 1rem;
        }

        .duration-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .duration-tab {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid var(--gray-300);
            border-radius: 6px;
            background: white;
            color: var(--gray-600);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.875rem;
        }

        .duration-tab.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .duration-input {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .number-input {
            display: flex;
            align-items: center;
            border: 1px solid var(--gray-300);
            border-radius: 6px;
            overflow: hidden;
        }

        .number-input button {
            padding: 0.5rem 1rem;
            border: none;
            background: var(--gray-100);
            color: var(--gray-600);
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .number-input button:hover {
            background: var(--gray-200);
        }

        .number-input input {
    width: 60px;
    text-align: center;
    border: none;
    padding: 0.5rem;
    font-size: 1rem;
    color: var(--secondary-color);
    -moz-appearance: textfield; /* Firefox */
    -webkit-appearance: textfield; /* Safari and Chrome */
    appearance: textfield; /* Standard */
}

.number-input input:focus {
    outline: none;
    background-color: #f0f0f0;
}

        .number-input input::-webkit-outer-spin-button,
        .number-input input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .cost-breakdown {
            background: var(--gray-50);
            padding: 1.5rem;
            border-radius: 8px;
            margin: 1.5rem 0;
        }

        .cost-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            color: var(--gray-600);
        }

        .cost-total {
            display: flex;
            justify-content: space-between;
            padding-top: 1rem;
            border-top: 1px solid var(--gray-300);
            font-weight: 600;
            color: var(--secondary-color);
        }

        .start-date input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--gray-300);
            border-radius: 6px;
            color: var(--secondary-color);
            margin-bottom: 1rem;
        }

        .duration-preview {
            background: var(--gray-50);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }

        .date-range {
            display: flex;
            justify-content: space-between;
        }

        .range-item .label {
            color: var(--gray-500);
            font-size: 0.875rem;
        }

        .range-item .value {
            display: block;
            color: var(--secondary-color);
            font-weight: 500;
            margin-top: 0.25rem;
        }

        .booking-actions {
            display: flex;
            gap: 1rem;
        }

        .btn {
            flex: 1;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 1rem;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-outline {
            border: 1px solid var(--gray-300);
            background: white;
            color: var(--gray-700);
        }

        .btn-outline:hover {
            background: var(--gray-50);
        }

        @media (max-width: 480px) {
            .booking-modal {
                padding: 0;
            }

            .booking-card {
                width: 100%;
                height: 100%;
                max-height: 100%;
                border-radius: 0;
            }

            .duration-tabs {
                flex-wrap: wrap;
            }

            .duration-tab {
                flex: 1 1 calc(50% - 0.25rem);
            }

            .booking-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Modal Content -->
    <div class="booking-modal" id="bookingModal">
        <div class="booking-card">
            <div class="booking-card-header">
                <h3>حجز العقار</h3>
                <button class="close-btn" onclick="closeBookingModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <div class="booking-card-content">
                <div class="property-summary">
                    <img src="images/home4.jpg" alt="العقار" class="property-image">
                    <div class="property-info">
                        <h4>شقة في المعادي</h4>
                        <p class="location">
                            <i class="fas fa-map-marker-alt"></i>
                            المعادي، القاهرة
                        </p>
                        <div class="base-price">
                            <span class="price">12,000</span>
                            <span class="currency">ج.م</span>
                            <span class="period">/شهر</span>
                        </div>
                    </div>
                </div>

                <div class="duration-selector">
                    <h4>اختر مدة الإيجار</h4>
                    <div class="duration-tabs">
                        <button class="duration-tab active" data-unit="days">أيام</button>
                        <button class="duration-tab" data-unit="weeks">أسابيع</button>
                        <button class="duration-tab" data-unit="months">شهور</button>
                        <button class="duration-tab" data-unit="years">سنوات</button>
                    </div>

                    <div class="duration-input">
                        <div class="number-input">
                            <button class="decrease" onclick="decreaseDuration()">-</button>
                            <input type="number" id="durationValue" value="1" min="1" onchange="calculateTotal()">
                            <button class="increase" onclick="increaseDuration()">+</button>
                        </div>
                        <span class="duration-label" id="durationLabel">يوم</span>
                    </div>
                </div>

                <div class="cost-breakdown">
                    <h4>تفاصيل التكلفة</h4>
                    <div class="cost-item">
                        <span>قيمة الإيجار</span>
                        <span id="rentCost">12,000 ج.م</span>
                    </div>
                    <div class="cost-item">
                        <span>تأمين</span>
                        <span id="insurance">1,000 ج.م</span>
                    </div>
                    <div class="cost-item">
                        <span>رسوم الخدمة</span>
                        <span id="serviceFee">500 ج.م</span>
                    </div>
                    <div class="cost-total">
                        <span>الإجمالي</span>
                        <span id="totalCost">13,500 ج.م</span>
                    </div>
                </div>

                <div class="start-date">
                    <h4>تاريخ بداية الإيجار</h4>
                    <input type="date" id="startDate" onchange="updateEndDate()">
                </div>

                <div class="duration-preview">
                    <div class="date-range">
                        <div class="range-item">
                            <span class="label">من</span>
                            <span class="value" id="startDatePreview">-</span>
                        </div>
                        <div class="range-item">
                            <span class="label">إلى</span>
                            <span class="value" id="endDatePreview">-</span>
                        </div>
                    </div>
                </div>

                <div class="booking-actions">
                    <button class="btn btn-primary" onclick="confirmBooking()">
                        <i class="fas fa-check"></i>
                        تأكيد الحجز
                    </button>
                    <button class="btn btn-outline" onclick="closeBookingModal()">
                        إلغاء
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        class BookingManager {
            constructor() {
                this.modal = document.getElementById('bookingModal');
                this.basePrice = 12000;
                this.duration = 1;
                this.durationUnit = 'days';
                this.init();
            }

            init() {
                this.setMinStartDate();
                this.setupEventListeners();
                this.calculateTotal();
                this.updateDurationLabel();
            }

            setupEventListeners() {
                document.querySelectorAll('.duration-tab').forEach(tab => {
                    tab.addEventListener('click', (e) => {
                        this.changeDurationUnit(e.target.dataset.unit);
                    });
                });

                document.getElementById('durationValue').addEventListener('change', () => {
                    this.calculateTotal();
                    this.updateEndDate();
                });

                document.getElementById('startDate').addEventListener('change', () => {
                    this.updateEndDate();
                });
            }

            changeDurationUnit(unit) {
                document.querySelectorAll('.duration-tab').forEach(tab => {
                    tab.classList.remove('active');
                });
                document.querySelector(`[data-unit="${unit}"]`).classList.add('active');
                this.durationUnit = unit;
                this.updateDurationLabel();
                this.calculateTotal();
                this.updateEndDate();
            }

            calculateTotal() {
               const duration = parseInt(document.getElementById('durationValue').value);
               const multipliers = {
                   days: 1/30,
                   weeks: 1/4,
                   months: 1,
                   years: 12
               };

               const rentAmount = this.basePrice * duration * multipliers[this.durationUnit];
               const serviceFee = rentAmount * 0.05; 
               const insurance = rentAmount * 0.1;
               const total = rentAmount + serviceFee + insurance;

               document.getElementById('rentCost').textContent = 
                   `${this.formatCurrency(rentAmount)} ج.م`;
               document.getElementById('serviceFee').textContent = 
                   `${this.formatCurrency(serviceFee)} ج.م`;
               document.getElementById('insurance').textContent = 
                   `${this.formatCurrency(insurance)} ج.م`;
               document.getElementById('totalCost').textContent = 
                   `${this.formatCurrency(total)} ج.م`;
           }

           formatCurrency(amount) {
               return amount.toLocaleString('ar-EG');
           }

           updateDurationLabel() {
               const labels = {
                   days: ['يوم', 'يومان', 'أيام'],
                   weeks: ['أسبوع', 'أسبوعان', 'أسابيع'],
                   months: ['شهر', 'شهران', 'شهور'],
                   years: ['سنة', 'سنتان', 'سنوات']
               };

               const duration = parseInt(document.getElementById('durationValue').value);
               const label = duration === 1 ? labels[this.durationUnit][0] :
                            duration === 2 ? labels[this.durationUnit][1] :
                            labels[this.durationUnit][2];
               
               document.getElementById('durationLabel').textContent = label;
           }

           setMinStartDate() {
               const today = new Date();
               const tomorrow = new Date(today);
               tomorrow.setDate(tomorrow.getDate() + 1);
               
               const startDateInput = document.getElementById('startDate');
               startDateInput.min = tomorrow.toISOString().split('T')[0];
               startDateInput.value = tomorrow.toISOString().split('T')[0];
               
               this.updateEndDate();
           }

           updateEndDate() {
               const startDate = new Date(document.getElementById('startDate').value);
               const duration = parseInt(document.getElementById('durationValue').value);
               const endDate = new Date(startDate);

               switch(this.durationUnit) {
                   case 'days':
                       endDate.setDate(endDate.getDate() + duration);
                       break;
                   case 'weeks':
                       endDate.setDate(endDate.getDate() + (duration * 7));
                       break;
                   case 'months':
                       endDate.setMonth(endDate.getMonth() + duration);
                       break;
                   case 'years':
                       endDate.setFullYear(endDate.getFullYear() + duration);
                       break;
               }

               document.getElementById('startDatePreview').textContent = 
                   this.formatDate(startDate);
               document.getElementById('endDatePreview').textContent = 
                   this.formatDate(endDate);
           }

           formatDate(date) {
               return date.toLocaleDateString('ar-EG', {
                   year: 'numeric',
                   month: 'long',
                   day: 'numeric'
               });
           }

           increaseDuration() {
               const input = document.getElementById('durationValue');
               if (parseInt(input.value) < 99) {
                   input.value = parseInt(input.value) + 1;
                   this.calculateTotal();
                   this.updateDurationLabel();
                   this.updateEndDate();
               }
           }

           decreaseDuration() {
               const input = document.getElementById('durationValue');
               if (parseInt(input.value) > 1) {
                   input.value = parseInt(input.value) - 1;
                   this.calculateTotal();
                   this.updateDurationLabel();
                   this.updateEndDate();
               }
           }

           confirmBooking() {
               // إضافة منطق تأكيد الحجز هنا
               alert('تم تأكيد الحجز بنجاح!');
               this.closeModal();
           }

           closeModal() {
               this.modal.style.display = 'none';
           }

           openModal() {
               this.modal.style.display = 'flex';
           }
       }

       // تهيئة مدير الحجز
       const bookingManager = new BookingManager();

       // Global functions
       function confirmBooking() {
           bookingManager.confirmBooking();
       }

       function closeBookingModal() {
           bookingManager.closeModal();
       }

       function increaseDuration() {
           bookingManager.increaseDuration();
       }

       function decreaseDuration() {
           bookingManager.decreaseDuration();
       }

       function calculateTotal() {
           bookingManager.calculateTotal();
       }

       function updateEndDate() {
           bookingManager.updateEndDate();
       }
   </script>
</body>
</html>
