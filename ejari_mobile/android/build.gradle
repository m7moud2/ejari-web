buildscript {
    ext.kotlin_version = '1.9.0'
    ext.flutter_compileSdkVersion = 35
    ext.flutter_targetSdkVersion = 35
    ext.flutter_minSdkVersion = 23
    repositories {
        google()
        mavenCentral()
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
