<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تمت العملية بنجاح - إيجاري</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/localization.css">
    <style>
        body {
            background: #f8fafc;
            padding-top: 80px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .success-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .success-card {
            background: white;
            padding: 4rem 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 600px;
            width: 100%;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .success-icon {
            width: 100px;
            height: 100px;
            background: #d1fae5;
            color: #10b981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin: 0 auto 2rem;
            animation: scaleIn 0.5s ease-out 0.3s backwards;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
            }

            to {
                transform: scale(1);
            }
        }

        .success-title {
            font-size: 2rem;
            color: #2c3e50;
            margin-bottom: 1rem;
        }

        .success-message {
            color: #6b7280;
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .order-details {
            background: #f9fafb;
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2.5rem;
            text-align: right;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid #e5e7eb;
        }

        .detail-row:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .detail-label {
            color: #6b7280;
            font-weight: 600;
        }

        .detail-value {
            color: #2c3e50;
            font-weight: 700;
        }

        .actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            padding: 1rem 2rem;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
        }

        .btn-outline {
            border: 2px solid #e5e7eb;
            color: #6b7280;
            padding: 1rem 2rem;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-outline:hover {
            border-color: #10b981;
            color: #10b981;
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <div class="logo"><a href="index.html">إيجاري</a></div>
            <ul class="nav-links">
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="properties.html">عقارات</a></li>
                <li><a href="services.html">الخدمات</a></li>
                <li><a href="contact.html">تواصل معنا</a></li>
            </ul>
        </div>
    </nav>

    <div class="success-container">
        <div class="success-card">
            <div class="success-icon">
                <i class="fas fa-check"></i>
            </div>
            <h1 class="success-title">تمت العملية بنجاح!</h1>
            <p class="success-message">شكراً لك، تم استلام طلبك بنجاح. سنقوم بمراجعته والتواصل معك في أقرب وقت ممكن.</p>

            <div class="order-details">
                <div class="detail-row">
                    <span class="detail-label">رقم الطلب</span>
                    <span class="detail-value">#ORD-2024-8569</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">التاريخ</span>
                    <span class="detail-value" id="currentDate">2024-01-01</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">الحالة</span>
                    <span class="detail-value" style="color: #10b981;">مكتمل</span>
                </div>
            </div>

            <div class="actions">
                <a href="index.html" class="btn-primary">العودة للرئيسية</a>
                <a href="tenant-dashboard.html" class="btn-outline">لوحة التحكم</a>
            </div>
        </div>
    </div>

    <script src="js/auto-translator.js"></script>
    <script src="js/localization.js"></script>
    <script>
        // Set current date
        const now = new Date();
        document.getElementById('currentDate').textContent = now.toLocaleDateString('ar-SA');
    </script>
</body>

</html>
